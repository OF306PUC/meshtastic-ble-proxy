# =============================================================================
# Meshtastic BLE Proxy — nRF52840
# =============================================================================

# -----------------------------------------------------------------------------
# Bluetooth — Peripheral, up to 6 simultaneous connections
# -----------------------------------------------------------------------------
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_MAX_CONN=6
# ACL TX buffer pool: at least one per connection to avoid head-of-line blocking
CONFIG_BT_BUF_ACL_TX_COUNT=8

# -----------------------------------------------------------------------------
# Connection parameters — wide range so Android's param update is accepted
# Android sends LL_CONNECTION_PARAM_REQ at ~1-3s; if outside preferred range
# Zephyr rejects it and Android disconnects with 0x13.
# Units: 1.25 ms per interval unit, 10 ms per timeout unit.
# -----------------------------------------------------------------------------
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=100
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400
# Must match BLE_NAME_PATTERN: ^.*_([0-9a-fA-F]{4})$
# Last 4 chars = hex suffix (ideally derived from MAC). Change before flashing.
CONFIG_BT_DEVICE_NAME="Meshtastic_CA1E"

# -----------------------------------------------------------------------------
# nanopb — protobuf decode for FromRadio routing (Phase 3)
# -----------------------------------------------------------------------------
CONFIG_NANOPB=y
CONFIG_RING_BUFFER=y

# ATT: larger MTU so FromRadio packets fit in a single read (no long-read needed)
CONFIG_BT_L2CAP_TX_MTU=251
CONFIG_BT_BUF_ACL_RX_SIZE=256
CONFIG_BT_BUF_ACL_TX_SIZE=256

# Static GATT table (BT_GATT_SERVICE_DEFINE)
CONFIG_BT_GATT_DYNAMIC_DB=n

# SMP: allow Android "Just Works" bonding.
# Android always sends Pairing Request with auth_req bonding flag set.
# CONFIG_BT_BONDABLE=n causes Zephyr to respond with bonding=0, which
# Android rejects after 3s (0x13). Allowing bonding with MAX_PAIRED=6
# lets Android complete the SC pairing and stay connected.
# Bonds are RAM-only (no CONFIG_BT_SETTINGS) — lost on reboot, which is
# fine: Android re-pairs on next connect with "Just Works".
CONFIG_BT_SMP=y
CONFIG_BT_MAX_PAIRED=6
CONFIG_BT_SMP_SC_ONLY=n
CONFIG_BT_SMP_SC_PAIR_ONLY=n

# -----------------------------------------------------------------------------
# GPIO — blinky activity LEDs (BLE read/write events)
# -----------------------------------------------------------------------------
CONFIG_GPIO=y

# -----------------------------------------------------------------------------
# UART — Meshtastic serial link on UART1 (P1.01 RX / P1.02 TX)
# -----------------------------------------------------------------------------
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y

# -----------------------------------------------------------------------------
# Logging (UART0 / JLink — independent of Meshtastic UART1)
# -----------------------------------------------------------------------------
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
# Larger log buffer: the bonding/config phase bursts a lot of log traffic; a
# small buffer makes the log core drop its own lines ("--- N messages dropped ---").
CONFIG_LOG_BUFFER_SIZE=8192

# BT stack debug was only needed while chasing the 0x13 disconnect, which is now
# resolved (stable multi-phone connections). Removed: the DBG flood overran the
# log backend during bonding and caused dropped log lines. Re-enable temporarily
# if a new connection-layer issue needs tracing.
#   CONFIG_BT_CONN_LOG_LEVEL_DBG=y
#   CONFIG_BT_SMP_LOG_LEVEL_DBG=y

# -----------------------------------------------------------------------------
# Memory
# -----------------------------------------------------------------------------
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
